<!DOCTYPE html>
<html>
  <head>
    <style>
        .without-direction{
            background-image:linear-gradient(#aa2bff,#ffc169,#87cdff);
            height:250px;
            width:300px;
        }
        .heading{
            color:#ffffff;
            font-family: "Roboto";
        }
        .top-direction{
            background-image:linear-gradient(to top,#daa4ff,#ff8c88,#ffc169);
            height:250px;
            width:300px;
        }
        .bottom-direction{
            background-image:linear-gradient(to bottom,#8a2387,#e94057,#f27121);
            height:250px;
            width:300px;
        }
        .left-direction{
            background-image:linear-gradient(to left,#7bbd36,#49b407,#ff9c38);
            height:250px;
            width:300px;
        }
        .right-direction{
            background-image:linear-gradient(to right,#fc3535,#826b7a,#87cdff);
            height:250px;
            width:300px;
        }
    </style>
  </head>
  <body>
        <div class="without-direction">
            <h1 class="heading">Without direction</h1>
        </div>  
        <div class="top-direction">
            <h1 class="heading">Direction - to top</h1>
        </div>  
        <div class="bottom-direction">
            <h1 class="heading"> direction - to bottom</h1>
        </div>  
        <div class="left-direction">
            <h1 class="heading">direction - to left</h1>
        </div>  
        <div class="right-direction">
            <h1 class="heading">direction - to right</h1>
        </div>  
  </body>
</html>
